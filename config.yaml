model:
  default: deepseek-v4-pro
  provider: deepseek
providers:
  zai:
    api_key: $GLM_API_KEY
    base_url: https://api.z.ai/api/paas/v4
  zhipu:
    api_key: $GLM_API_KEY
    base_url: https://open.bigmodel.cn/api/paas/v4
fallback_providers: []
credential_pool_strategies: {}
toolsets:
- hermes-cli
agent:
  max_turns: 120
  gateway_timeout: 1800
  restart_drain_timeout: 60
  api_max_retries: 5
  service_tier: ''
  tool_use_enforcement: auto
  gateway_timeout_warning: 900
  gateway_notify_interval: 180
  gateway_auto_continue_freshness: 3600
  image_input_mode: auto
  disabled_toolsets: []
  verbose: false
  reasoning_effort: low
  personalities:
    concise: You are a concise assistant. Keep responses brief and to the point.
terminal:
  backend: local
  modal_mode: auto
  cwd: .
  timeout: 180
  env_passthrough:
  - TAVILY_API_KEY
  - DEEPSEEK_API_KEY
  - GLM_API_KEY
  - MYSQL_STOCK_PASSWORD
  shell_init_files: []
  auto_source_bashrc: true
  docker_image: nikolaik/python-nodejs:python3.11-nodejs20
  docker_forward_env: []
  docker_env: {}
  singularity_image: docker://nikolaik/python-nodejs:python3.11-nodejs20
  modal_image: nikolaik/python-nodejs:python3.11-nodejs20
  daytona_image: nikolaik/python-nodejs:python3.11-nodejs20
  vercel_runtime: node24
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true
  docker_volumes: []
  docker_mount_cwd_to_workspace: false
  docker_run_as_host_user: false
  persistent_shell: true
web:
  backend: tavily
  search_backend: ''
  extract_backend: ''
browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false
  allow_private_urls: false
  engine: auto
  auto_local_for_private_urls: true
  cdp_url: http://localhost:9377
  dialog_policy: must_respond
  dialog_timeout_s: 300
  camofox:
    managed_persistence: true
checkpoints:
  enabled: true
  max_snapshots: 5
  max_total_size_mb: 500
  max_file_size_mb: 10
  auto_prune: true
  retention_days: 7
  delete_orphans: true
  min_interval_hours: 24
file_read_max_chars: 100000
tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 5
    same_tool_failure: 8
    idempotent_no_progress: 5
compression:
  enabled: true
  threshold: 0.7
  target_ratio: 0.3
  protect_last_n: 50
  hygiene_hard_message_limit: 400
prompt_caching:
  cache_ttl: 5m
openrouter:
  response_cache: true
  response_cache_ttl: 300
bedrock:
  region: ''
  discovery:
    enabled: false
    provider_filter: []
    refresh_interval: 3600
  guardrail: null
auxiliary:
  vision:
    provider: deepseek
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key: ''
    timeout: 120
    extra_body: {}
    download_timeout: 30
  web_extract:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 360
    extra_body: {}
  compression:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
  session_search:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
    max_concurrency: 3
  skills_hub:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  approval:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  mcp:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  title_generation:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 30
    extra_body: {}
  triage_specifier:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 120
    extra_body: {}
  curator:
    provider: auto
    model: ''
    base_url: ''
    api_key: ''
    timeout: 600
    extra_body: {}
display:
  compact: false
  personality: concise
  resume_display: full
  busy_input_mode: interrupt
  tui_auto_resume_recent: false
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  final_response_markdown: strip
  persistent_output: true
  persistent_output_max_lines: 200
  inline_diffs: true
  show_cost: true
  skin: default
  language: en
  tui_status_indicator: kaomoji
  user_message_preview:
    first_lines: 2
    last_lines: 2
  interim_assistant_messages: true
  tool_progress_command: false
  tool_progress_overrides: {}
  tool_preview_length: 0
  ephemeral_system_ttl: 0
  platforms:
    qqbot: {}
  runtime_footer:
    enabled: false
    fields:
    - model
    - context_pct
    - cwd
  copy_shortcut: auto
  tool_progress: all
  background_process_notifications: all
dashboard:
  theme: default
privacy:
  redact_pii: false
tts:
  provider: edge
  edge:
    voice: en-US-AriaNeural
  elevenlabs:
    voice_id: pNInz6obpgDQGcFmaJgB
    model_id: eleven_multilingual_v2
  openai:
    model: gpt-4o-mini-tts
    voice: alloy
  xai:
    voice_id: eve
    language: en
    sample_rate: 24000
    bit_rate: 128000
  mistral:
    model: voxtral-mini-tts-2603
    voice_id: c69964a6-ab8b-4f8a-9465-ec0925096ec8
  neutts:
    ref_audio: ''
    ref_text: ''
    model: neuphonic/neutts-air-q4-gguf
    device: cpu
  piper:
    voice: en_US-lessac-medium
stt:
  enabled: true
  provider: local
  local:
    model: base
    language: ''
  openai:
    model: whisper-1
  mistral:
    model: voxtral-mini-latest
voice:
  record_key: ctrl+b
  max_recording_seconds: 120
  auto_tts: false
  beep_enabled: true
  silence_threshold: 200
  silence_duration: 3.0
human_delay:
  mode: 'off'
  min_ms: 800
  max_ms: 2500
context:
  engine: compressor
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 4000
  user_char_limit: 2000
  provider: hindsight
  nudge_interval: 10
  flush_min_turns: 6
  hindsight:
    mode: local_embedded
    llm_provider: openai_compatible
    llm_base_url: https://api.deepseek.com/v1
    llm_model: deepseek-v4-flash
  endpoint: http://localhost:8888
  api_key: $DEEPSEEK_API_KEY
delegation:
  model: deepseek-chat
  provider: ''
  base_url: ''
  api_key: ''
  inherit_mcp_toolsets: true
  max_iterations: 50
  child_timeout_seconds: 900
  reasoning_effort: ''
  max_concurrent_children: 8
  max_spawn_depth: 6
  orchestrator_enabled: true
  subagent_auto_approve: true
prefill_messages_file: ''
goals:
  max_turns: 20
skills:
  external_dirs: []
  template_vars: true
  inline_shell: false
  inline_shell_timeout: 10
  guard_agent_created: false
  creation_nudge_interval: 15
curator:
  enabled: true
  interval_hours: 168
  min_idle_hours: 2
  stale_after_days: 30
  archive_after_days: 90
  backup:
    enabled: true
    keep: 5
honcho: {}
timezone: Asia/Shanghai
slack:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  channel_prompts: {}
discord:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  auto_thread: true
  reactions: true
  channel_prompts: {}
  dm_role_auth_guild: ''
  server_actions: ''
whatsapp: {}
telegram:
  reactions: false
  channel_prompts: {}
  allowed_chats: ''
mattermost:
  require_mention: true
  free_response_channels: ''
  allowed_channels: ''
  channel_prompts: {}
matrix:
  require_mention: true
  free_response_rooms: ''
  allowed_rooms: ''
approvals:
  mode: manual
  timeout: 60
  cron_mode: deny
  mcp_reload_confirm: true
command_allowlist:
- recursive delete
- git *
- pip install *
- npm install *
- echo * >> *
- source *
quick_commands: {}
hooks: {}
hooks_auto_accept: false
personalities: {}
security:
  allow_private_urls: false
  redact_secrets: true
  tirith_enabled: true
  tirith_path: tirith
  tirith_timeout: 5
  tirith_fail_open: true
  website_blocklist:
    enabled: false
    domains: []
    shared_files: []
cron:
  wrap_response: true
  max_parallel_jobs: 3
kanban:
  dispatch_in_gateway: true
  dispatch_interval_seconds: 10
  failure_limit: 2
code_execution:
  mode: project
  timeout: 300
  max_tool_calls: 50
logging:
  level: INFO
  max_size_mb: 50
  backup_count: 3
model_catalog:
  enabled: true
  url: https://hermes-agent.nousresearch.com/docs/api/model-catalog.json
  ttl_hours: 24
  providers: {}
network:
  force_ipv4: false
sessions:
  auto_prune: true
  retention_days: 90
  vacuum_after_prune: true
  min_interval_hours: 24
onboarding:
  seen:
    openclaw_residue_cleanup: true
    busy_input_prompt: true
    tool_progress_prompt: true
updates:
  pre_update_backup: false
  backup_keep: 5
_config_version: 23
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4
platform_toolsets:
  cli:
  - hermes-cli
  - spotify
fallback_model:
  provider: deepseek
  model: deepseek-v4-pro
mcp_servers:
  time:
    command: uvx
    args:
    - mcp-server-time
  github:
    url: https://api.githubcopilot.com/mcp/
    headers:
      Authorization: Bearer $GITHUB_TOKEN
      User-Agent: hermes-agent/1.0
  sequential-thinking:
    command: npx
    args:
    - -y
    - '@modelcontextprotocol/server-sequential-thinking'
  mysql:
    command: npx
    args:
    - -y
    - '@berthojoris/mcp-mysql-server'
    - mysql://stock:${MYSQL_STOCK_PASSWORD}@localhost:3306/stock_kline
  web-search:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-web-search.py
  web-extract:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-web-extract.py
    timeout: 120
  whisper-stt:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-whisper.py
    timeout: 360
  graphify:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-graphify.py
  llm-wiki:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-llm-wiki.py
  deep-research:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-deep-research.py
    timeout: 180
  stock-sdk:
    command: /home/pebynn/.hermes/node/bin/stock-mcp
    args: []
    timeout: 120
  skill-auditor:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-skill-auditor.py
  prompt-optimizer:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-prompt-optimizer.py
  cost-guard:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-cost-guard.py
  security-auditor:
    command: /home/pebynn/.hermes/hermes-agent/venv/bin/python3
    args:
    - /home/pebynn/.hermes/mcp-servers/mcp-security-auditor.py
plugins:
  enabled:
  - spotify
  disabled: []
